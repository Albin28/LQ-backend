<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login - LegisQ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body class="aurora-bg">

    <div class="login-refactored">
        <div class="card-gloss">
            <div class="mb-8">
                <span class="emoji-lg">🏛️</span>
            </div>

            <h2 class="title-login">Welcome Back</h2>
            <p class="text-muted mb-8">Enter your credentials to access the secure dashboard.</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="badge status-rejected status-badge-block">
                ⚠️ {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="form-group text-left">
                    <label for="username" class="sr-only">Username</label>
                    <input type="text" name="username" class="input-neon" id="username" placeholder="Username"
                        autocomplete="username" required>
                </div>
                <div class="form-group text-left">
                    <label for="password" class="sr-only">Password</label>
                    <input type="password" name="password" class="input-neon" id="password" placeholder="Password"
                        autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-glow mt-4">
                    Unlock Dashboard
                </button>
            </form>

            <div class="border-top-glass">
                <a href="/" class="text-muted text-sm hover:text-white transition-colors">
                    ← Return to Public Site
                </a>
            </div>
        </div>
    </div>

</body>

</html>
