<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login - LegisQ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">
            <img src="{{ url_for('static', filename='logo.png') }}" class="login-logo" alt="LegisQ Logo">
            <h2 class="mb-2 text-primary">LegisQ Admin</h2>
            <p class="text-muted mb-5">Secure Access Portal</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="badge status-rejected mb-4">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" name="username" class="form-input" id="username" placeholder="Enter username"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" name="password" class="form-input" id="password" placeholder="Enter password"
                        required>
                </div>

                <button type="submit" class="btn-primary w-full mt-2 btn-lg">
                    Login to Dashboard
                </button>
            </form>

            <div class="login-footer">
                <a href="/" class="text-muted text-sm border-b-dotted">
                    ← Back to Public Site
                </a>
            </div>
        </div>
    </div>

</body>

</html>
