<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LegisQ{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Floating Glass Navigation -->
    <div class="nav-wrapper">
        <nav class="glass-nav">
            <a href="{{ url_for('home') }}" class="nav-brand">
                <span class="logo-icon">🏛️</span> LegisQ
            </a>

            <div class="nav-links">
                <a href="{{ url_for('home') }}"
                    class="nav-link {% if request.path == url_for('home') %}active{% endif %}">Bills</a>
                <a href="{{ url_for('mps_dashboard') }}"
                    class="nav-link {% if request.path == url_for('mps_dashboard') %}active{% endif %}">MPs</a>
                <a href="{{ url_for('current_affairs') }}"
                    class="nav-link {% if request.path == url_for('current_affairs') %}active{% endif %}">News</a>
            </div>

            {% if 'user' in session %}
            <div class="nav-auth">
                <a href="{{ url_for('admin_dashboard') }}" class="btn-nav-action">Admin</a>
                <a href="{{ url_for('logout') }}" class="nav-link logout-link">Logout</a>
            </div>
            {% else %}
            <a href="{{ url_for('login') }}" class="btn-nav-action">Login</a>
            {% endif %}
        </nav>
    </div>

    <!-- Main Content Injection -->
    <main>
        {% block content %}{% endblock %}
    </main>

</body>

</html>
